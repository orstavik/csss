<script type="module">
  import * as CSSS from "/src/csss.js";
  import runTests from "./mdTester.js";

  function stripLayers(css) {
    return css.replace(/@layer[^{]+\{([\s\S]*?)\n\}/g, (_, inner) =>
      inner.replace(/^  /gm, "").trim()
    ).trim();
  }

  function extractCsssFromTrippleDots(html) {
    const root = new DOMParser().parseFromString(html.replaceAll("…", ""), "text/html");
    return [...root.querySelectorAll("[class]")]
      .flatMap(el => [...el.classList].filter(c => c.includes("$")))
      .join(" ");
  }

  function test({ after, css }) {
    const statement = extractCsssFromTrippleDots(after.value);
    const expected = css?.value;
    const res = statement.split(/\s+/g).map(CSSS.parse).flat();
    const actual = res.map(({ cssText }) => stripLayers(cssText)).join("\n\n");
    return {
      key: statement,
      actual: actual,
      expected: expected
    };
  }
  runTests("border,box,block,iBlock,flex,grid", test, "/shots/genre/");
</script>
