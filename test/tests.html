<script type="module">
  import * as CSSS from "/src/csss.js";
  import runTests from "./mdTester.js";

  function stripLayers(css) {
    return css.replace(/@layer[^{]+\{([\s\S]*?)\n\}/g, (_, inner) =>
      inner.replace(/^  /gm, "").trim()
    ).trim();
  }

  function test({ csss, css }) {
    const statement = csss.value;
    const expected = css?.value;
    const res = statement.split(/\s+/g).map(CSSS.parse).flat();
    const actual = res.map(({ cssText }) => stripLayers(cssText)).join("\n\n");
    return {
      key: statement,
      actual: actual,
      expected: expected
    };
  }
  runTests("animations,bg,border,block,block2,iBlock,filter,flex,gap,grid,grandItems,nestedItems,color_palette,how2UseGradientColors,gradientFunctions,font,textDecoration,shadows,position,transitions,transforms,objectFit,backdropFilters,calcMath,svg,paragraph", test);
</script>
