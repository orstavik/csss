<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSSS Tests</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 1rem;
      max-width: 600px;
      margin: auto;
    }

    .case {
      margin: 0.5rem 0;
      padding: 0.5rem;
      border-left: 3px solid #ddd;
    }

    .pass {
      border-color: #22c55e;
      color: #22c55e;
      font-weight: bold;
    }

    .fail {
      border-color: #ef4444;
      color: #ef4444;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>CSSS Tests</h1>
  <div id="out"></div>

  <script type="module">
    import * as CSSS from './csss.js'
    const out = document.getElementById('out')
    const tmpSheet = () => {
      const s = document.createElement('style'); document.head.appendChild(s); return s.sheet
    }

    function runTestFor(title, [shorts, check]) {
      const sheet = tmpSheet();
      let seen = new Set();
      shorts.flatMap(s => seen.has(s) ? [] : (seen.add(s), CSSS.parse(s).map(r => (sheet.insertRule(r.cssText, sheet.cssRules.length), r.cssText))));
      return check(sheet, seen);
    }

    function showResult(title, ok) {
      const el = document.createElement('div');
      el.innerHTML = `<h3>${title}</h3><div class="case ${ok ? 'pass' : 'fail'}">${ok ? '✓' : '✗'}</div>`;
      out.appendChild(el);
    }

    const suites = {
      'Basic insertion': [['$block(padding(1rem),overflowHidden)', '$flex(gap(1rem))'], (sheet) => sheet.cssRules.length === 2],
      'Dedupe': [['$block(padding(1rem))', '$block(padding(1rem))'], (sheet, seen) => sheet.cssRules.length === 1 && seen.size === 1],
      'Multiple insertions': [['$blockItem(margin(1rem),inlineSize(100px),blockSize(50px),scrollMargin(0.5rem))'], (sheet) => sheet.cssRules.length === 1],
      'Classlist order precedence': [['$block(padding(1rem))', '$block(padding(2rem))'], (sheet) => {
        const rules = [...sheet.cssRules]
        return rules.length === 2 &&
          rules[0].cssText.includes('padding: 1rem') &&
          rules[1].cssText.includes('padding: 2rem')
      }],
      'Layer precedence': [['$block(padding(1rem))', '|$block(padding(2rem))', '||$blockItem(margin(3rem))'], (sheet) => {
        const rules = [...sheet.cssRules]
        return rules.length === 3 &&
          rules.some(r => r.cssText.includes('@layer containerDefault') && r.cssText.includes('padding: 1rem')) &&
          rules.some(r => r.cssText.includes('@layer itemsDefault') && r.cssText.includes('padding: 2rem')) &&
          rules.some(r => r.cssText.includes('@layer grandItemsDefault') && r.cssText.includes('margin: 3rem'))
      }],
      'Sequence sorting': [
        ['||$blockItem(margin(1rem))', '$block(padding(1rem))', '|$flex(gap(1rem))'],
        (sheet) => {
          const rules = [...sheet.cssRules]
          if (rules.length !== 3) return false
          const orderCorrect =
            rules[0].cssText.includes('@layer containerDefault') &&
            rules[1].cssText.includes('@layer itemsDefault') &&
            rules[2].cssText.includes('@layer grandItemsDefault')
          return orderCorrect
        }
      ]
    }
    for (const [title, test] of Object.entries(suites)) 
      showResult(title, runTestFor(title, test));

  </script>
</body>

</html>
